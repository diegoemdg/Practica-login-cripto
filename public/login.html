<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inicia sesion</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="auth">
      <section class="panel auth-panel">
        <h1>Inicia sesion</h1>
        <p>Ingresa tu ID y password para entrar al sistema.</p>

        <form data-endpoint="/api/login" data-redirect="/home.html">
          <label>ID
            <input name="userId" autocomplete="username" required>
          </label>
          <label>Password
            <input name="password" type="password" autocomplete="current-password" required>
          </label>
          <button type="submit">Entrar</button>
          <p class="message"></p>
        </form>

        <div class="link-row">
          <a href="/forgot-password.html">Olvide contrasena</a>
          <a href="/">Registrate</a>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
