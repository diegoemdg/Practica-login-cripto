<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Olvide contrasena</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="auth">
      <section class="panel auth-panel">
        <h1>Olvide contrasena</h1>
        <p>Escribe tu correo y enviaremos un enlace para crear una password nueva.</p>

        <form data-endpoint="/api/forgot-password">
          <label>Correo
            <input name="email" type="email" autocomplete="email" required>
          </label>
          <button type="submit">Enviar enlace</button>
          <p class="message"></p>
        </form>

        <p class="small-link"><a href="/login.html">Volver a inicio de sesion</a></p>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
