<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Restablecer password</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="auth">
      <section class="panel auth-panel">
        <h1>Restablecer password</h1>
        <p>Escribe una nueva password. Despues podras iniciar sesion con ella.</p>

      <form data-endpoint="/api/reset-password" data-redirect="/login.html?reset=1">
        <input name="token" type="hidden" data-token-from-url required>
        <label>Nueva password
          <input name="newPassword" type="password" autocomplete="new-password" minlength="8" required>
        </label>
        <button type="submit">Guardar cambio</button>
        <p class="message"></p>
      </form>
      <p class="small-link"><a href="/login.html">Volver a inicio de sesion</a></p>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
